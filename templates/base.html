<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}기업회생 분석{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='top-nav.css') }}?v=2">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=28">
  </head>
  <body>
    {% include "_top_nav.html" %}
    <div class="app-shell">
      <main class="app-main {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
      </main>
    </div>

    {% if message is defined and message %}
      <div class="toast-stack" aria-live="polite" aria-atomic="true">
        <div class="toast toast-success" role="status">
          {{ message }}
        </div>
      </div>
    {% endif %}

    {% block scripts %}{% endblock %}
  </body>
</html>
