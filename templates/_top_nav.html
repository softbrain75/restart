{% set current_page = active_page|default("analysis") %}
<nav class="site-nav" aria-label="주요 메뉴">
  <div class="site-nav__inner">
    <a class="site-brand" href="{{ url_for('index') }}" aria-label="기업회생닥터 홈">
      <span class="site-brand__icon" aria-hidden="true">
        <img class="site-brand__logo" src="{{ url_for('static', filename='logo.png') }}?v=3" alt="">
      </span>
      <span class="site-brand__name">기업회생닥터</span>
    </a>

    <div class="site-nav__links">
      <a class="site-nav__link{% if current_page == 'home' %} is-active{% endif %}" href="{{ url_for('index') }}">사용안내</a>
      <a class="site-nav__link{% if current_page == 'analysis' %} is-active{% endif %}" href="{{ url_for('analysis_index') }}">재무분석</a>
    </div>

    <div class="site-nav__actions">
      {% if current_page == "home" %}
        <a class="site-nav__cta" href="{{ url_for('analysis_index') }}">진단 시작</a>
      {% endif %}

      {% if current_admin %}
        <a class="site-nav__auth-link{% if current_page == 'admin' %} is-active{% endif %}" href="{{ url_for('admin_dashboard') }}">관리자</a>
        <form class="site-nav__logout" action="{{ url_for('admin_logout') }}" method="post">
          <button type="submit">관리자 로그아웃</button>
        </form>
      {% elif current_user %}
        <a class="site-nav__auth-link{% if current_page == 'mypage' %} is-active{% endif %}" href="{{ url_for('mypage') }}">마이페이지</a>
        <form class="site-nav__logout" action="{{ url_for('logout') }}" method="post">
          <button type="submit">로그아웃</button>
        </form>
      {% else %}
        <a class="site-nav__auth-link{% if current_page == 'login' %} is-active{% endif %}" href="{{ url_for('login') }}">로그인</a>
        <a class="site-nav__auth-link{% if current_page == 'signup' %} is-active{% endif %}" href="{{ url_for('signup') }}">회원가입</a>
      {% endif %}
    </div>
  </div>
</nav>
