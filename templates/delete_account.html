{% extends "base.html" %}

{% block title %}회원탈퇴 - 기업회생 분석{% endblock %}
{% block main_class %}account-main{% endblock %}

{% block content %}
  <section class="account-card account-card--narrow" aria-label="회원탈퇴">
    <div class="account-card__header">
      <h1>회원탈퇴</h1>
      <p>탈퇴하면 계정과 저장된 분석 이력을 더 이상 사용할 수 없습니다.</p>
    </div>

    {% if error %}
      <div class="notice notice-error" role="alert">{{ error }}</div>
    {% endif %}

    <form class="account-form" action="{{ url_for('delete_account') }}" method="post">
      <label class="field">
        <span>이메일 확인</span>
        <input class="input" name="email" type="email" placeholder="{{ current_user.email }}" autocomplete="email" required>
      </label>

      <label class="checkbox-field">
        <input name="confirm_delete" type="checkbox" required>
        <span>회원탈퇴 시 계정과 저장된 분석 이력을 더 이상 사용할 수 없음을 확인했습니다.</span>
      </label>

      <div class="account-actions">
        <a class="button button-secondary" href="{{ url_for('profile') }}">취소</a>
        <button class="button button-danger" type="submit">회원탈퇴</button>
      </div>
    </form>
  </section>
{% endblock %}
