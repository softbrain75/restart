<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}기업회생 분석{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=14">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="app-brand" aria-label="서비스명">
          <span class="app-brand__mark">RE</span>
          <div class="app-brand__text">
            <h1>{% block header_title %}기업회생 분석{% endblock %}</h1>
            <p>{% block header_subtitle %}Excel 업로드 대기{% endblock %}</p>
          </div>
        </div>

        <div class="app-header__actions">
          {% block header_actions %}{% endblock %}
        </div>
      </header>

      <main class="app-main">
        {% block content %}{% endblock %}
      </main>
    </div>

    {% block scripts %}{% endblock %}
  </body>
</html>
