<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}기업회생 분석{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='top-nav.css') }}?v=3">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=41">
  </head>
  <body>
    {% include "_top_nav.html" %}
    <div class="app-shell">
      <main class="app-main {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
      </main>
    </div>

    {% if message is defined and message %}
      <div class="toast-stack" aria-live="polite" aria-atomic="true">
        <div class="toast toast-success" role="status">
          {{ message }}
        </div>
      </div>
    {% endif %}

    <script>
      (() => {
        const formSelector = [
          "form[data-financial-form]",
          "form[data-debt-form]",
          "form[data-income-form]",
          "form[data-collateral-form]",
        ].join(",");
        const fieldSelector = [
          "input:not([type='hidden']):not([type='submit']):not([type='button']):not([type='reset'])",
          "select",
          "textarea",
        ].join(",");

        function isFocusable(field) {
          return (
            !field.disabled &&
            !field.readOnly &&
            field.getClientRects().length > 0
          );
        }

        document.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" || event.isComposing || event.keyCode === 229) return;

          const field = event.target.closest(fieldSelector);
          if (!field || field.tagName === "TEXTAREA") return;

          const form = field.closest(formSelector);
          if (!form) return;

          event.preventDefault();

          const fields = Array.from(form.querySelectorAll(fieldSelector)).filter(isFocusable);
          const currentIndex = fields.indexOf(field);
          if (currentIndex === -1) return;

          const nextField = fields[currentIndex + 1];

          field.blur();
          if (nextField) {
            requestAnimationFrame(() => {
              nextField.focus();
              if (typeof nextField.select === "function") {
                nextField.select();
              }
            });
          }
        });
      })();

      (() => {
        const tooltips = Array.from(document.querySelectorAll(".info-tooltip"));
        const margin = 12;
        const gap = 8;

        function closeTooltip(tooltip) {
          tooltip.classList.remove("is-open", "is-pinned", "is-above");
        }

        function closeOtherTooltips(currentTooltip) {
          tooltips.forEach((tooltip) => {
            if (tooltip !== currentTooltip) {
              closeTooltip(tooltip);
            }
          });
        }

        function positionTooltip(tooltip) {
          const trigger = tooltip.querySelector(".info-tooltip__trigger");
          const content = tooltip.querySelector(".info-tooltip__content");
          if (!trigger || !content) return;

          const triggerRect = trigger.getBoundingClientRect();
          const width = Math.min(440, window.innerWidth - margin * 2);
          content.style.setProperty("--tooltip-width", `${width}px`);

          let left = triggerRect.left;
          left = Math.min(left, window.innerWidth - margin - width);
          left = Math.max(margin, left);

          content.style.setProperty("--tooltip-left", `${left}px`);
          content.style.setProperty(
            "--tooltip-arrow-left",
            `${triggerRect.left + triggerRect.width / 2 - left}px`
          );

          tooltip.classList.add("is-open");
          tooltip.classList.remove("is-above");

          const height = content.offsetHeight;
          let top = triggerRect.bottom + gap;
          if (
            top + height > window.innerHeight - margin &&
            triggerRect.top - height - gap >= margin
          ) {
            top = triggerRect.top - height - gap;
            tooltip.classList.add("is-above");
          }

          content.style.setProperty("--tooltip-top", `${Math.max(margin, top)}px`);
        }

        function openTooltip(tooltip) {
          closeOtherTooltips(tooltip);
          positionTooltip(tooltip);
        }

        tooltips.forEach((tooltip) => {
          const trigger = tooltip.querySelector(".info-tooltip__trigger");
          if (!trigger) return;

          tooltip.addEventListener("mouseenter", () => openTooltip(tooltip));
          tooltip.addEventListener("mouseleave", () => {
            if (!tooltip.classList.contains("is-pinned")) {
              closeTooltip(tooltip);
            }
          });

          trigger.addEventListener("focus", () => openTooltip(tooltip));
          trigger.addEventListener("blur", () => {
            if (!tooltip.classList.contains("is-pinned")) {
              closeTooltip(tooltip);
            }
          });
          trigger.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();

            const pinned = tooltip.classList.contains("is-pinned");
            closeOtherTooltips(tooltip);
            if (pinned) {
              closeTooltip(tooltip);
              return;
            }

            tooltip.classList.add("is-pinned");
            positionTooltip(tooltip);
          });
        });

        document.addEventListener("click", () => {
          tooltips.forEach(closeTooltip);
        });

        window.addEventListener("resize", () => {
          document.querySelectorAll(".info-tooltip.is-open, .info-tooltip.is-pinned").forEach(positionTooltip);
        });

        document.addEventListener(
          "scroll",
          () => {
            document.querySelectorAll(".info-tooltip.is-open, .info-tooltip.is-pinned").forEach(positionTooltip);
          },
          true
        );
      })();
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
